# ---------------------------------------------------------------------------
# Raw Prometheus scrape_configs for YugabyteDB (alternative to ServiceMonitors)
# ---------------------------------------------------------------------------
# Use this when you run a plain prometheus.yml rather than the Prometheus
# Operator. Produces the SAME labels as the ServiceMonitors, so dashboards
# work unchanged.
#
# IMPORTANT: do NOT rely on global.external_labels for vcluster/env. Those
# labels are only appended on remote_write/federation, never stored locally,
# so the Grafana dropdowns would be empty. Stamp them as target_labels here.
#
# SECTION A  Inside-vcluster Prometheus (scrapes YB within the same vCluster)
# SECTION B  Host-cluster Prometheus (scrapes vCluster synced pods on host)
# SECTION C  Direct namespace / higher env (no vCluster layer)
# SECTION D  Non-Kubernetes / static targets (VMs, bare metal)
#
# To load in kube-prometheus-stack (additionalScrapeConfigs):
#   kubectl -n monitoring create secret generic yb-scrape-configs \
#     --from-file=yb-scrape.yaml=monitoring/prometheus-scrape-config.yaml
#   Then in values-monitoring.yaml:
#     prometheus:
#       prometheusSpec:
#         additionalScrapeConfigs:
#           name: yb-scrape-configs
#           key: yb-scrape.yaml
#   (strip the section headers and only pass the scrape_configs list)
#
# Label table (all sections produce these):
# +-----------+------------------------------------------------------+
# | Label     | Source                                               |
# +-----------+------------------------------------------------------+
# | job       | job_name                                             |
# | vcluster  | constant relabel or extracted from pod/ns name       |
# | env       | constant relabel (= vcluster name in lower envs)     |
# | namespace | __meta_kubernetes_namespace (or constant for static) |
# | pod       | __meta_kubernetes_pod_name (or from address)         |
# +-----------+------------------------------------------------------+
# ---------------------------------------------------------------------------

scrape_configs:

# ===========================================================================
# SECTION A: Inside-vCluster Prometheus
# Deploy this Prometheus INSIDE cbg-demo (cbg-test, cbg-dev). It can reach
# YB pods directly by in-cluster DNS. This config stamps vcluster + env.
# Repeat this section in each vCluster, changing the vcluster/env values.
# ===========================================================================

  # ----- masters: port 7000 -----
  - job_name: yb-master
    metrics_path: /prometheus-metrics
    kubernetes_sd_configs:
      - role: endpoints
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        separator: ";"
        regex: (cbg-in|cbg-uae|cbg-global);yb-masters;http-ui
        action: keep
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - target_label: vcluster
        replacement: cbg-demo          # CHANGE per vCluster
      - target_label: env
        replacement: cbg-demo          # lower env: env == vcluster name
    metric_relabel_configs:
      - source_labels: [metric_type, __name__]
        separator: ";"
        regex: "(server|cluster|);.*|tablet;(rocksdb_current_version_sst_files_size|rocksdb_block_cache_hit|rocksdb_block_cache_miss|log_bytes_logged|majority_sst_files_rejections)"
        action: keep

  # ----- tservers: ports 9000 (server/rocksdb) + 13000 (YSQL) -----
  - job_name: yb-tserver
    metrics_path: /prometheus-metrics
    kubernetes_sd_configs:
      - role: endpoints
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        separator: ";"
        regex: (cbg-in|cbg-uae|cbg-global);yb-tservers;(http-ui|http-ysql-met)
        action: keep
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - target_label: vcluster
        replacement: cbg-demo          # CHANGE per vCluster
      - target_label: env
        replacement: cbg-demo
    metric_relabel_configs:
      - source_labels: [metric_type, __name__]
        separator: ";"
        regex: "(server|cluster|);.*|tablet;(rocksdb_current_version_sst_files_size|rocksdb_block_cache_hit|rocksdb_block_cache_miss|log_bytes_logged|majority_sst_files_rejections)"
        action: keep


