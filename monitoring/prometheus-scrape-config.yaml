# ---------------------------------------------------------------------------
# Raw Prometheus scrape_configs for YugabyteDB (alternative to ServiceMonitors)
# ---------------------------------------------------------------------------
# Use this when you run a plain prometheus.yml rather than the Prometheus
# Operator. Produces the SAME labels as the ServiceMonitors, so dashboards
# work unchanged.
#
# IMPORTANT: do NOT rely on global.external_labels for vcluster/env. Those
# labels are only appended on remote_write/federation, never stored locally,
# so the Grafana dropdowns would be empty. Stamp them as target_labels here.
#
# SECTION A  Host-cluster Prometheus (scrapes vCluster synced pods on host)
# SECTION B  Direct namespace / higher env (no vCluster layer)
# SECTION C  Non-Kubernetes / static targets (VMs, bare metal)
#
# To load in kube-prometheus-stack (additionalScrapeConfigs):
#   kubectl -n monitoring create secret generic yb-scrape-configs \
#     --from-file=yb-scrape.yaml=monitoring/prometheus-scrape-config.yaml
#   Then in values-monitoring.yaml:
#     prometheus:
#       prometheusSpec:
#         additionalScrapeConfigs:
#           name: yb-scrape-configs
#           key: yb-scrape.yaml
#   (strip the section headers and only pass the scrape_configs list)
#
# Label table (all sections produce these):
# +-----------+------------------------------------------------------+
# | Label     | Source                                               |
# +-----------+------------------------------------------------------+
# | job       | job_name                                             |
# | vcluster  | from host namespace name (Section A) or absent (B/C) |
# | env       | constant relabel (= vcluster name in lower envs)     |
# | namespace | __meta_kubernetes_namespace (or constant for static) |
# | pod       | __meta_kubernetes_pod_name (or from address)         |
# +-----------+------------------------------------------------------+
# ---------------------------------------------------------------------------

