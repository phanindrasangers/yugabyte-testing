# ServiceMonitor for Kuberhealthy running inside vClusters (host-level Prometheus)
# Kuberhealthy syncs its service to the host namespace via the vCluster -x- naming.
# NO relabeling needed: kuberhealthy already embeds vcluster, env, namespace,
# check, status, and error as native metric labels — adding relabelings would
# overwrite them with wrong values from the host-side k8s metadata.
# Adjust matchLabels and port name to match your kuberhealthy Helm chart values.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kuberhealthy-vcluster-host
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames: [cbg-demo, cbg-test, cbg-dev]   # host ns = vcluster names
  selector:
    matchLabels:
      app: kuberhealthy                           # label preserved by vCluster sync
  endpoints:
    - port: http                                  # kuberhealthy default port name
      path: /metrics
      interval: 30s
      metricRelabelings:
        # drop internal kuberhealthy metrics; keep only check status and duration
        - sourceLabels: [__name__]
          regex: 'kuberhealthy_(check|check_duration_seconds|running)'
          action: keep
